<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservations - Prestige Event</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- jsPDF for document generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-logo">Prestige <span>Event</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="events.html">Événements</a></li>
            <li><a href="reservations.html">Réservations</a></li>
            <li><a href="login.html">Connexion</a></li>
            <li id="admin-link" style="display:none"><a href="admin/dashboard.html" class="btn-outline" style="padding: 8px 20px; font-size: 0.8rem; border-radius: 30px;">⚙️ Espace Admin</a></li>
        </ul>
    </nav>

    <section class="reservations" style="margin-top: 80px;">
        <div class="section-header reveal visible">
            <span class="section-tag">Demande Directe</span>
            <h2>Réservez votre Date</h2>
        </div>
        <div class="reservation-form-container reveal visible">
            <form id="booking-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Type d'Événement</label>
                        <select name="event-type" required>
                            <option value="mariage">Mariage</option>
                            <option value="anniversaire">Anniversaire</option>
                            <option value="corporatif">Séminaire / Entreprise</option>
                            <option value="autre">Autre</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date Souhaitée</label>
                        <input type="date" name="event-date" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre d'invités</label>
                        <input type="number" name="guests" placeholder="ex: 150" required>
                    </div>
                    <div class="form-group">
                        <label>Budget approximatif (€)</label>
                        <input type="text" name="budget" placeholder="ex: 5000" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Précisez vos besoins</label>
                    <textarea name="notes" rows="4" placeholder="Dites-nous en plus sur vos envies..."></textarea>
                </div>
                <button type="submit" id="submit-btn" class="btn-gold" style="width: 100%; cursor: pointer;">Confirmer & Envoyer au WhatsApp Admin</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="footer-copy">&copy; 2026 Prestige Event. Tous droits réservés.</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
