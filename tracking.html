<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">

</head>
<body>
    <nav>
        <div class="nav-logo">Prestige <span>Event</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>

            <li><a href="support.html">Assistance</a></li>

    <section class="suivi" style="margin-top: 80px;">
        <div class="section-header reveal visible">
            <span class="section-tag">Espace Client</span>
            <h2>Suivez votre Commande</h2>
        </div>
        <div class="tracking-search reveal visible">
            <input type="text" id="track-id" placeholder="Entrez votre numéro de devis ou commande">
            <button class="btn-gold" id="track-btn">Rechercher</button>
        </div>
        <div id="track-result" class="tracking-result reveal"></div>
    </section>
